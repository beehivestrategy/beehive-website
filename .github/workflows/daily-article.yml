name: Daily Automated SEO Article Generation

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Generate Daily Article
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: meta-llama/llama-3-8b-instruct:free
        run: pnpm exec tsx scripts/generate-daily-article.ts

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/insights.ts src/locales/en.json src/locales/zh-CN.json src/locales/zh-TW.json
          git commit -m "chore(content): auto-generate daily SEO article" || exit 0
          git push origin HEAD
